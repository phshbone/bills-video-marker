<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#151821" />
<title>Tap Marker</title>
<style>
  :root{
    --bg:#11141c;
    --panel:#1a1f2b;
    --panel2:#232a38;
    --text:#f5f7fb;
    --muted:#aab2c0;
    --accent:#ffd84d;
    --danger:#ff6b6b;
    --border:#343c4d;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:linear-gradient(180deg,#0c0f15,#151a24);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  body{padding:env(safe-area-inset-top) 12px env(safe-area-inset-bottom)}
  .app{max-width:980px;margin:0 auto}
  header{padding:14px 4px 10px}
  h1{margin:0;font-size:1.35rem}
  .sub{margin-top:4px;color:var(--muted);font-size:.92rem}
  .card{background:rgba(26,31,43,.95);border:1px solid var(--border);border-radius:18px;padding:12px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .stage-wrap{position:relative;background:#000;border-radius:14px;overflow:hidden;min-height:220px;display:grid;place-items:center}
  video{display:block;width:100%;max-height:68vh;background:#000}
  canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
  .empty{padding:70px 18px;text-align:center;color:var(--muted)}
  .toolbar{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}
  button,.file-label,select,input[type="range"]{font:inherit}
  button,.file-label{
    min-height:48px;border-radius:13px;border:1px solid var(--border);
    background:var(--panel2);color:var(--text);font-weight:700;padding:10px 12px;
    display:flex;align-items:center;justify-content:center;cursor:pointer
  }
  button.primary,.file-label.primary{background:var(--accent);color:#171717;border-color:#e7c43e}
  button.danger{background:#3a2024;color:#ffd8dc;border-color:#6a333a}
  button:disabled{opacity:.45;cursor:not-allowed}
  input[type=file]{display:none}
  .controls{display:grid;grid-template-columns:1fr;gap:12px;margin-top:12px}
  .control{background:#151a24;border:1px solid var(--border);border-radius:14px;padding:10px}
  .control label{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:.9rem;margin-bottom:8px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  input[type=color]{width:100%;height:42px;border:0;border-radius:10px;background:transparent}
  input[type=range]{width:100%}
  .status{margin-top:10px;min-height:24px;color:var(--muted);font-size:.9rem}
  .timeline{margin-top:10px}
  .timeline input{width:100%}
  .small{font-size:.82rem;color:var(--muted);line-height:1.35}
  .count{color:var(--accent);font-weight:800}
  .exporting{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:20}
  .exporting.show{display:flex}
  .export-box{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:22px;max-width:320px;text-align:center}
  @media(min-width:760px){
    .toolbar{grid-template-columns:repeat(4,1fr)}
    .controls{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Tap Marker</h1>
    <div class="sub">Add visible taps to an existing screen recording.</div>
  </header>

  <div class="card">
    <div id="stageWrap" class="stage-wrap">
      <div id="emptyState" class="empty">Choose a screen recording to begin.</div>
      <video id="video" playsinline preload="metadata" style="display:none"></video>
      <canvas id="overlay"></canvas>
    </div>

    <div class="timeline" id="timelineWrap" style="display:none">
      <input id="seek" type="range" min="0" max="1000" value="0">
    </div>

    <div class="toolbar">
      <label class="file-label primary">
        Choose Video
        <input id="fileInput" type="file" accept="video/*">
      </label>
      <button id="playBtn" disabled>Play</button>
      <button id="undoBtn" disabled>Undo Tap</button>
      <button id="exportBtn" disabled>Export Video</button>
    </div>

    <div class="controls">
      <div class="control">
        <label><span>Tap color</span><span id="colorText">Yellow</span></label>
        <input id="colorPicker" type="color" value="#ffd84d">
      </div>
      <div class="control">
        <label><span>Tap size</span><span><span id="sizeValue">54</span> px</span></label>
        <input id="sizeSlider" type="range" min="24" max="110" step="2" value="54">
      </div>
      <div class="control">
        <label><span>Tap duration</span><span><span id="durationValue">0.65</span> sec</span></label>
        <input id="durationSlider" type="range" min="0.25" max="1.5" step="0.05" value="0.65">
      </div>
      <div class="control">
        <label><span>Tap count</span><span class="count" id="tapCount">0</span></label>
        <div class="small">Play the video, then tap directly on the video wherever the original press happened.</div>
      </div>
    </div>

    <div id="status" class="status"></div>
  </div>
</div>

<div id="exporting" class="exporting">
  <div class="export-box">
    <strong>Exporting video…</strong>
    <div class="small" style="margin-top:8px">Keep this page open until the recording finishes.</div>
  </div>
</div>

<script>
(() => {
  const video = document.getElementById('video');
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');
  const stageWrap = document.getElementById('stageWrap');
  const emptyState = document.getElementById('emptyState');
  const fileInput = document.getElementById('fileInput');
  const playBtn = document.getElementById('playBtn');
  const undoBtn = document.getElementById('undoBtn');
  const exportBtn = document.getElementById('exportBtn');
  const seek = document.getElementById('seek');
  const timelineWrap = document.getElementById('timelineWrap');
  const colorPicker = document.getElementById('colorPicker');
  const colorText = document.getElementById('colorText');
  const sizeSlider = document.getElementById('sizeSlider');
  const durationSlider = document.getElementById('durationSlider');
  const sizeValue = document.getElementById('sizeValue');
  const durationValue = document.getElementById('durationValue');
  const tapCount = document.getElementById('tapCount');
  const status = document.getElementById('status');
  const exporting = document.getElementById('exporting');

  let taps = [];
  let objectUrl = null;
  let sourceFile = null;
  let raf = null;
  let isExporting = false;

  function setStatus(text){ status.textContent = text || ''; }

  function resizeCanvas(){
    const rect = stageWrap.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    drawOverlay();
  }

  function videoRect(){
    const wrap = stageWrap.getBoundingClientRect();
    const v = video.getBoundingClientRect();
    return {x:v.left-wrap.left,y:v.top-wrap.top,width:v.width,height:v.height};
  }

  function drawTap(g, tap, time, scaleX=1, scaleY=1){
    const age = time - tap.time;
    if(age < 0 || age > tap.duration) return;
    const p = age / tap.duration;
    const grow = 0.8 + p * 0.38;
    const alpha = 1 - p;
    const radius = tap.size * 0.5 * grow;
    g.save();
    g.globalAlpha = alpha;
    g.strokeStyle = tap.color;
    g.lineWidth = Math.max(4, tap.size * 0.10);
    g.beginPath();
    g.arc(tap.x * scaleX, tap.y * scaleY, radius * ((scaleX+scaleY)/2), 0, Math.PI*2);
    g.stroke();
    g.globalAlpha = Math.max(0, alpha * 0.35);
    g.fillStyle = tap.color;
    g.beginPath();
    g.arc(tap.x * scaleX, tap.y * scaleY, radius * 0.35 * ((scaleX+scaleY)/2), 0, Math.PI*2);
    g.fill();
    g.restore();
  }

  function drawOverlay(){
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,canvas.width/dpr,canvas.height/dpr);
    if(!video.src) return;
    const vr = videoRect();
    ctx.save();
    ctx.translate(vr.x, vr.y);
    taps.forEach(t => drawTap(ctx, t, video.currentTime));
    ctx.restore();
  }

  function loop(){
    drawOverlay();
    if(video.duration) seek.value = Math.round((video.currentTime / video.duration) * 1000);
    raf = requestAnimationFrame(loop);
  }

  function startLoop(){
    cancelAnimationFrame(raf);
    loop();
  }

  fileInput.addEventListener('change', () => {
    const file = fileInput.files && fileInput.files[0];
    if(!file) return;
    sourceFile = file;
    taps = [];
    updateTapCount();
    if(objectUrl) URL.revokeObjectURL(objectUrl);
    objectUrl = URL.createObjectURL(file);
    video.src = objectUrl;
    video.style.display = 'block';
    emptyState.style.display = 'none';
    timelineWrap.style.display = 'block';
    setStatus('Loading video…');
    video.load();
  });

  video.addEventListener('loadedmetadata', () => {
    playBtn.disabled = false;
    exportBtn.disabled = false;
    setStatus('Ready. Press Play, then tap the video to add markers.');
    requestAnimationFrame(resizeCanvas);
  });

  video.addEventListener('play', () => playBtn.textContent = 'Pause');
  video.addEventListener('pause', () => playBtn.textContent = 'Play');
  video.addEventListener('ended', () => playBtn.textContent = 'Play');

  playBtn.addEventListener('click', async () => {
    if(video.paused) {
      try { await video.play(); } catch(e) { setStatus('Playback could not start. Tap the video and try again.'); }
    } else {
      video.pause();
    }
  });

  seek.addEventListener('input', () => {
    if(video.duration) video.currentTime = (seek.value / 1000) * video.duration;
  });

  canvas.addEventListener('pointerdown', (e) => {
    if(!video.src || isExporting) return;
    const c = canvas.getBoundingClientRect();
    const vr = videoRect();
    const x = e.clientX - c.left - vr.x;
    const y = e.clientY - c.top - vr.y;
    if(x < 0 || y < 0 || x > vr.width || y > vr.height) return;

    taps.push({
      time: video.currentTime,
      x,
      y,
      color: colorPicker.value,
      size: Number(sizeSlider.value),
      duration: Number(durationSlider.value)
    });
    taps.sort((a,b)=>a.time-b.time);
    updateTapCount();
    drawOverlay();
  });

  undoBtn.addEventListener('click', () => {
    if(!taps.length) return;
    taps.pop();
    updateTapCount();
    drawOverlay();
  });

  function updateTapCount(){
    tapCount.textContent = taps.length;
    undoBtn.disabled = taps.length === 0;
  }

  colorPicker.addEventListener('input', () => colorText.textContent = colorPicker.value.toUpperCase());
  sizeSlider.addEventListener('input', () => sizeValue.textContent = sizeSlider.value);
  durationSlider.addEventListener('input', () => durationValue.textContent = Number(durationSlider.value).toFixed(2));

  async function exportVideo(){
    if(!sourceFile || !video.duration) return;
    if(!window.MediaRecorder || !HTMLCanvasElement.prototype.captureStream){
      setStatus('This browser cannot export video. Try Chrome or Safari on a newer device.');
      return;
    }

    isExporting = true;
    exporting.classList.add('show');
    video.pause();

    const out = document.createElement('canvas');
    out.width = video.videoWidth;
    out.height = video.videoHeight;
    const g = out.getContext('2d');

    const fps = 30;
    const canvasStream = out.captureStream(fps);
    let combinedTracks = [...canvasStream.getVideoTracks()];
    let audioContext = null;
    let audioSource = null;
    let audioDest = null;

    try{
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      await audioContext.resume();
      audioSource = audioContext.createMediaElementSource(video);
      audioDest = audioContext.createMediaStreamDestination();
      audioSource.connect(audioDest);
      audioSource.connect(audioContext.destination);
      const audioTracks = audioDest.stream.getAudioTracks();
      if(audioTracks.length) combinedTracks.push(audioTracks[0]);
    }catch(err){
      console.warn('Audio capture unavailable:', err);
    }

    const stream = new MediaStream(combinedTracks);
    const candidates = [
      'video/mp4;codecs=h264,aac',
      'video/webm;codecs=vp9,opus',
      'video/webm;codecs=vp8,opus',
      'video/webm'
    ];
    let mimeType = '';
    for(const type of candidates){
      if(MediaRecorder.isTypeSupported(type)){ mimeType = type; break; }
    }

    let recorder;
    try{
      recorder = new MediaRecorder(stream, mimeType ? {mimeType, videoBitsPerSecond: 6000000} : {videoBitsPerSecond:6000000});
    }catch(err){
      setStatus('Could not start video export on this device.');
      exporting.classList.remove('show');
      isExporting = false;
      return;
    }

    const chunks = [];
    recorder.ondataavailable = e => { if(e.data && e.data.size) chunks.push(e.data); };

    const finished = new Promise(resolve => {
      recorder.onstop = () => resolve();
    });

    let exportRAF;
    const drawFrame = () => {
      g.drawImage(video, 0, 0, out.width, out.height);
      const displayRect = videoRect();
      const sx = out.width / displayRect.width;
      const sy = out.height / displayRect.height;
      taps.forEach(t => drawTap(g, t, video.currentTime, sx, sy));
      if(!video.paused && !video.ended) exportRAF = requestAnimationFrame(drawFrame);
    };

    video.currentTime = 0;
    await new Promise(r => {
      const onSeeked = () => { video.removeEventListener('seeked', onSeeked); r(); };
      video.addEventListener('seeked', onSeeked);
    });

    recorder.start(250);
    drawFrame();

    try{
      await video.play();
    }catch(err){
      recorder.stop();
      setStatus('Playback permission blocked the export. Tap Play once, then try Export again.');
      exporting.classList.remove('show');
      isExporting = false;
      return;
    }

    await new Promise(resolve => video.addEventListener('ended', resolve, {once:true}));
    cancelAnimationFrame(exportRAF);
    if(recorder.state !== 'inactive') recorder.stop();
    await finished;

    const blob = new Blob(chunks, {type: recorder.mimeType || mimeType || 'video/webm'});
    const ext = (blob.type.includes('mp4')) ? 'mp4' : 'webm';
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'tap-marked-video.' + ext;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 30000);

    if(audioSource){ try{ audioSource.disconnect(); }catch(e){} }
    if(audioContext){ try{ await audioContext.close(); }catch(e){} }

    exporting.classList.remove('show');
    isExporting = false;
    setStatus('Export complete. The finished video should appear in Downloads or Files.');
    video.currentTime = 0;
    drawOverlay();
  }

  exportBtn.addEventListener('click', exportVideo);
  window.addEventListener('resize', resizeCanvas);
  startLoop();
})();
</script>
</body>
</html>
